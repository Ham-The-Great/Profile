<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek HK Desk Dashboard</title>
    <style>
        /* Editorial Premium E-Ink Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #000000;
            background-color: #ffffff;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* 1.5 : 1 Fixed Aspect Ratio Compact Workspace Frame */
        .dashboard {
            width: 100%;
            height: 100%;
            max-width: 900px;
            max-height: 600px;
            display: grid;
            grid-template-columns: 1.2fr auto 1.1fr auto 1.3fr;
            grid-template-rows: 100%;
        }

        .column {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        /* Pure structural hair-line dividers */
        .divider-vertical {
            width: 1px;
            background-color: #000000;
            height: 100%;
            margin: 0 24px;
        }

        .divider-horizontal {
            border-bottom: 1px solid #000000;
            width: 100%;
            margin: 16px 0;
        }

        .divider-dashed {
            border-bottom: 1px dashed #000000;
            width: 100%;
            margin: 16px 0;
        }

        /* Section Header Typography */
        h2 {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            color: #000000;
        }

        /* Column 1: Time, Date & Ambient Weather Stack */
        .time-group {
            display: flex;
            flex-direction: column;
        }

        #clock {
            font-size: 76px;
            font-weight: 200;
            line-height: 0.95;
            letter-spacing: -3px;
            font-variant-numeric: tabular-nums;
        }

        #date {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-top: 6px;
            text-transform: uppercase;
        }

        .weather-vertical {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin: 4px 0;
        }

        #weather-temp {
            font-size: 42px;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -1px;
        }

        #weather-humidity {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #555555;
        }

        .sun-row {
            display: flex;
            gap: 24px;
            font-size: 12px;
            font-weight: 500;
        }

        /* Column 2: HKO Warning Signals & Holiday Countdown Stack */
        .warning-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 52px;
        }

        .warning-grid img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            filter: grayscale(100%) contrast(200%);
        }

        .no-warning-banner {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #777777;
            font-style: italic;
            padding-top: 2px;
        }

        .holiday-vertical {
            display: flex;
            flex-direction: column;
            margin-top: 4px;
        }

        #holiday-days {
            font-size: 42px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -1px;
        }

        #holiday-name {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #555555;
            margin-top: 4px;
            line-height: 1.3;
        }

        /* Column 3: Calendar Matrix Layout */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 10px;
            text-align: center;
            font-size: 12px;
        }

        .calendar-day-label {
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            color: #666666;
            margin-bottom: 4px;
        }

        .calendar-cell {
            padding: 5px 0;
            font-variant-numeric: tabular-nums;
            font-weight: 500;
        }

        .calendar-current-day {
            background-color: #000000;
            color: #ffffff;
            font-weight: 700;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="column" style="justify-content: space-between;">
            <div class="time-group">
                <div id="clock">00:00</div>
                <div id="date">--- -- ---</div>
            </div>
            
            <div class="divider-horizontal"></div>
            
            <div class="weather-vertical">
                <div id="weather-temp">--°C</div>
                <div id="weather-humidity">--% RH</div>
            </div>

            <div class="divider-horizontal"></div>

            <div class="sun-row">
                <div>↑ <span id="sunrise">--:--</span></div>
                <div>↓ <span id="sunset">--:--</span></div>
            </div>
        </div>

        <div class="divider-vertical"></div>

        <div class="column">
            <h2>Alert Signals</h2>
            <div id="warning-target" class="warning-grid">
                <div class="no-warning-banner">Connecting...</div>
            </div>

            <div class="divider-dashed" style="margin-top: auto;"></div>

            <h2>Next Holiday</h2>
            <div class="holiday-vertical">
                <div id="holiday-days">--</div>
                <div id="holiday-name">Calculating...</div>
            </div>
        </div>

        <div class="divider-vertical"></div>

        <div class="column">
            <h2 id="calendar-month-year">Calendar</h2>
            <div class="calendar-grid" id="calendar-days-target">
                </div>
        </div>
    </div>

    <script>
        // Official HKO API Map Link Lookup Array
        const HKO_ICON_MAP = {
            "WTIGNL1":   "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc1.gif",
            "WTIGNL3":   "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc3.gif",
            "WTIGNL8NE": "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc8ne.gif",
            "WTIGNL8NW": "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc8d.gif",
            "WTIGNL8SE": "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc8se.gif",
            "WTIGNL8SW": "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc8sw.gif",
            "WTIGNL9":   "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc9.gif",
            "WTIGNL10":  "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc10.gif",
            "WRAINA":    "https://www.hko.gov.hk/en/wxinfo/dailywx/images/raina.gif",
            "WRAINR":    "https://www.hko.gov.hk/en/wxinfo/dailywx/images/rainr.gif",
            "WRAINB":    "https://www.hko.gov.hk/en/wxinfo/dailywx/images/rainb.gif",
            "WTS":       "https://www.hko.gov.hk/en/wxinfo/dailywx/images/ts.gif",
            "WTHU":      "https://www.hko.gov.hk/en/wxinfo/dailywx/images/ts.gif",
            "WFIREY":    "https://www.hko.gov.hk/en/wxinfo/dailywx/images/firey.gif",
            "WFIREO":    "https://www.hko.gov.hk/en/wxinfo/dailywx/images/firer.gif",
            "WHOT":      "https://www.hko.gov.hk/en/wxinfo/dailywx/images/vhot.gif",
            "WCOLD":     "https://www.hko.gov.hk/en/wxinfo/dailywx/images/cold.gif",
            "WFROST":    "https://www.hko.gov.hk/en/wxinfo/dailywx/images/frost.gif",
            "WLIP":      "https://www.hko.gov.hk/en/wxinfo/dailywx/images/landslip.gif",
            "WMSGNL":    "https://www.hko.gov.hk/images/wxinfo/warning/sms.gif"
        };

        // Standardized 2026 Hong Kong General Holidays Dataset
        const HK_HOLIDAYS_2026 = [
            { name: "New Year's Day", date: "2026-01-01" },
            { name: "Lunar New Year's Day", date: "2026-02-17" },
            { name: "Second Day of Lunar New Year", date: "2026-02-18" },
            { name: "Third Day of Lunar New Year", date: "2026-02-19" },
            { name: "Good Friday", date: "2026-04-03" },
            { name: "Day following Good Friday", date: "2026-04-04" },
            { name: "Day following Ching Ming Festival", date: "2026-04-06" },
            { name: "Day following Easter Monday", date: "2026-04-07" },
            { name: "Labour Day", date: "2026-05-01" },
            { name: "Day following Birthday of the Buddha", date: "2026-05-25" },
            { name: "Tuen Ng Festival", date: "2026-06-19" },
            { name: "HKSAR Establishment Day", date: "2026-07-01" },
            { name: "Day following Chinese Mid-Autumn Festival", date: "2026-09-26" },
            { name: "National Day", date: "2026-10-01" },
            { name: "Day following Chung Yeung Festival", date: "2026-10-19" },
            { name: "Christmas Day", date: "2026-12-25" },
            { name: "First weekday after Christmas Day", date: "2026-12-26" }
        ];

        // 1. Clock Engine
        function updateClock() {
            const hkTime = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Hong_Kong"}));
            
            const hours = String(hkTime.getHours()).padStart(2, '0');
            const minutes = String(hkTime.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;

            const options = { weekday: 'short', month: 'short', day: 'numeric' };
            document.getElementById('date').textContent = hkTime.toLocaleDateString('en-US', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Sunrise / Sunset Ephemeris
        async function fetchSunData() {
            try {
                const res = await fetch('https://api.sunrise-sunset.org/json?lat=22.3193&lng=114.1694&formatted=0');
                const data = await res.json();
                if (data.status === 'OK') {
                    const sunriseParsed = new Date(data.results.sunrise).toLocaleTimeString('en-US', {timeZone: 'Asia/Hong_Kong', hour12: false, hour: '2-digit', minute:'2-digit'});
                    const sunsetParsed = new Date(data.results.sunset).toLocaleTimeString('en-US', {timeZone: 'Asia/Hong_Kong', hour12: false, hour: '2-digit', minute:'2-digit'});
                    document.getElementById('sunrise').textContent = sunriseParsed;
                    document.getElementById('sunset').textContent = sunsetParsed;
                }
            } catch (e) {
                document.getElementById('sunrise').textContent = "--:--";
            }
        }

        // 3. Direct Native HKO Signals Feed (CORS Native Support Verified)
        async function fetchHKOWarnings() {
            const target = document.getElementById('warning-target');
            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=en');
                const data = await res.json();
                target.innerHTML = '';
                
                // Filter out keys where actionCode is CANCEL
                const activeCodes = Object.keys(data).filter(code => data[code].actionCode !== 'CANCEL');
                
                if (activeCodes.length === 0) {
                    target.innerHTML = '<div class="no-warning-banner">No Active Signals</div>';
                    return;
                }
        
                activeCodes.forEach(code => {
                    const item = data[code];
                    const img = document.createElement('img');
                    const manualSrc = HKO_ICON_MAP[item.code];
                    
                    img.src = manualSrc ? manualSrc : `https://www.hko.gov.hk/images/wxinfo/warning/${item.code.toLowerCase()}.gif`;
                    img.alt = item.name;
                    target.appendChild(img);
                });
            } catch (e) {
                target.innerHTML = '<div class="no-warning-banner">Signals Off</div>';
            }
        }

        // 4. HKO Real-Time Temperature & Humidity Feed
        async function fetchCurrentWeather() {
            try {
                const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en');
                const data = await res.json();
                
                // Isolating the central Hong Kong Observatory HQ ground station indices
                const hkoTempObj = data.temperature.data.find(item => item.place === "Hong Kong Observatory");
                const temp = hkoTempObj ? hkoTempObj.value : data.temperature.data[0].value;
                const humidity = data.humidity.data[0].value;

                document.getElementById('weather-temp').textContent = `${temp}°C`;
                document.getElementById('weather-humidity').textContent = `${humidity}% RH`;
            } catch (e) {
                document.getElementById('weather-temp').textContent = "--°C";
                document.getElementById('weather-humidity').textContent = "--% RH";
            }
        }

        // 5. Offline Resilient Holiday Countdown Engine
        function updateHolidayCountdown() {
            const hkTime = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Hong_Kong"}));
            const todayNormalized = new Date(hkTime.getFullYear(), hkTime.getMonth(), hkTime.getDate());

            let nextHoliday = null;
            let daysRemaining = Infinity;

            for (const holiday of HK_HOLIDAYS_2026) {
                const parts = holiday.date.split('-');
                const holidayDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                const diffTime = holidayDate - todayNormalized;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays >= 0 && diffDays < daysRemaining) {
                    daysRemaining = diffDays;
                    nextHoliday = holiday;
                }
            }

            const targetDays = document.getElementById('holiday-days');
            const targetName = document.getElementById('holiday-name');

            if (nextHoliday) {
                targetName.textContent = nextHoliday.name;
                if (daysRemaining === 0) {
                    targetDays.textContent = "TODAY";
                } else if (daysRemaining === 1) {
                    targetDays.textContent = "1 DAY";
                } else {
                    targetDays.textContent = `${daysRemaining} DAYS`;
                }
            } else {
                targetName.textContent = "End of Year Cycle";
                targetDays.textContent = "--";
            }
        }

        // 6. Programmatic Monthly Calendar Constructor
        function buildCalendar() {
            const hkTime = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Hong_Kong"}));
            const currentYear = hkTime.getFullYear();
            const currentMonth = hkTime.getMonth();
            const currentDay = hkTime.getDate();

            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('calendar-month-year').textContent = `${monthNames[currentMonth]} ${currentYear}`;

            const target = document.getElementById('calendar-days-target');
            target.innerHTML = '';

            const labels = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
            labels.forEach(l => {
                const div = document.createElement('div');
                div.className = 'calendar-day-label';
                div.textContent = l;
                target.appendChild(div);
            });

            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div');
                target.appendChild(emptyCell);
            }

            for (let day = 1; day <= totalDays; day++) {
                const cell = document.createElement('div');
                cell.className = 'calendar-cell';
                cell.textContent = day;

                if (day === currentDay) {
                    cell.className += ' calendar-current-day';
                }
                target.appendChild(cell);
            }
        }

        // Master Sync Engine
        function masterSync() {
            fetchSunData();
            fetchHKOWarnings();
            fetchCurrentWeather();
            updateHolidayCountdown();
            buildCalendar();
        }

        masterSync();
        // Synchronization intervals mapped out safely to every 10 minutes
        setInterval(masterSync, 600000);
    </script>
</body>
</html>
