<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Desk Dashboard</title>
    <style>
        /* E-Ink High-Contrast Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        /* Fixed 1.5:1 E-Ink Aspect Ratio Container */
        .dashboard-container {
            width: 100%;
            height: 100%;
            max-width: 1024px;
            aspect-ratio: 1.5 / 1;
            border: 3px solid #000000;
            display: grid;
            grid-template-columns: 1fr 1.1fr 1.3fr;
            grid-template-rows: 1fr;
            background-color: #ffffff;
        }

        /* Common Panel Styling */
        .panel {
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .panel:not(:last-child) {
            border-right: 2px solid #000000;
        }

        .panel-title {
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-bottom: 2px solid #000000;
            padding-bottom: 4px;
            margin-bottom: 12px;
        }

        /* Left Panel: Time & Sun */
        .time-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
        }

        .clock {
            font-size: 3.8rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.03em;
            margin-bottom: 4px;
        }

        .date {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .sun-row {
            display: flex;
            gap: 16px;
            border-top: 1px dashed #000000;
            padding-top: 12px;
        }

        .sun-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .sun-item svg {
            width: 20px;
            height: 20px;
            stroke: #000000;
            fill: none;
            stroke-width: 2;
        }

        /* Middle Panel: HKO Warnings */
        .warning-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .warning-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .warning-icon {
            width: 64px;
            height: 64px;
            object-fit: contain;
            /* High contrast filter optimization for e-ink screens */
            filter: grayscale(100%) contrast(200%);
        }

        .no-warning-msg {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 2px dashed #000000;
            padding: 16px;
            width: 100%;
        }

        /* Right Panel: Status Feeds Split */
        .status-split {
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-between;
        }

        .status-block {
            height: 48%;
            display: flex;
            flex-direction: column;
        }

        .status-content {
            flex-grow: 1;
            font-size: 0.88rem;
            font-weight: 500;
            line-height: 1.3;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .status-line {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            margin-bottom: 4px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #000000;
            margin-top: 5px;
            flex-shrink: 0;
        }

        .status-normal {
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #000000;
            margin-auto: 0;
            padding-top: 8px;
        }

        .status-normal::before {
            content: "✓";
            font-size: 1.2rem;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <!-- COLUMN 1: TIME & ASTRONOMY -->
        <div class="panel">
            <div class="panel-title">Hong Kong Time</div>
            <div class="time-section">
                <div class="clock" id="clock">00:00</div>
                <div class="date" id="date">Loading...</div>
            </div>
            <div class="sun-row">
                <div class="sun-item">
                    <!-- Sunrise Wire Icon -->
                    <svg viewBox="0 0 24 24"><path d="M12 2v4M5.22 5.22l2.83 2.83M18.78 5.22l-2.83 2.83M2 18h20M12 18a6 6 0 0 0-6-6M18 18a6 6 0 0 0-6-6"/></svg>
                    <span id="sunrise">--:--</span>
                </div>
                <div class="sun-item">
                    <!-- Sunset Wire Icon -->
                    <svg viewBox="0 0 24 24"><path d="M12 6v4M5.22 7.22l2.83-2.83M18.78 7.22l-2.83-2.83M2 18h20M6 18a6 6 0 0 1 12 0"/></svg>
                    <span id="sunset">--:--</span>
                </div>
            </div>
        </div>

        <!-- COLUMN 2: HKO OFFICIAL WARNINGS -->
        <div class="panel">
            <div class="panel-title">HKO Warnings</div>
            <div class="warning-container" id="warning-container">
                <div class="no-warning-msg">All Clear</div>
            </div>
        </div>

        <!-- COLUMN 3: LIVE TRANSIT & TRAFFIC -->
        <div class="panel">
            <div class="status-split">
                
                <!-- MTR Status Block -->
                <div class="status-block">
                    <div class="panel-title">MTR Network Status</div>
                    <div class="status-content" id="mtr-status">
                        <div class="status-normal">Normal Service</div>
                    </div>
                </div>
                
                <!-- Road Traffic Status Block -->
                <div class="status-block">
                    <div class="panel-title">Live Traffic / Roads</div>
                    <div class="status-content" id="traffic-status">
                        <div class="status-normal">Traffic Flow Normal</div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        // Update Time & Date
        function updateClock() {
            const now = new Date();
            
            // Format time
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
            
            // Format date
            const options = { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-HK', options);
        }
        setInterval(updateClock, 20000); // Update every 20 seconds
        updateClock();

        // Fetch Sunrise and Sunset via open API (Hong Kong Lat/Lon)
        async function fetchSunTimes() {
            try {
                const response = await fetch('https://api.sunrise-sunset.org/json?lat=22.3193&lng=114.1694&formatted=0');
                const data = await response.json();
                if (data.status === 'OK') {
                    const sunriseUTC = new Date(data.results.sunrise);
                    const sunsetUTC = new Date(data.results.sunset);
                    
                    // Convert to HK Local Time options
                    const opts = { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Hong_Kong' };
                    document.getElementById('sunrise').textContent = sunriseUTC.toLocaleTimeString('en-HK', opts);
                    document.getElementById('sunset').textContent = sunsetUTC.toLocaleTimeString('en-HK', opts);
                }
            } catch (error) {
                console.error("Failed to fetch sun times:", error);
            }
        }

        // Mapping official HKO API warning codes to true official static HKO web graphics
        const hkoIconMap = {
            "WTCSGNL1": "tc1.gif", "WTCSGNL3": "tc3.gif", 
            "WTCSGNL8NE": "tc8ne.gif", "WTCSGNL8NW": "tc8nw.gif", "WTCSGNL8SE": "tc8se.gif", "WTCSGNL8SW": "tc8sw.gif",
            "WTCSGNL9": "tc9.gif", "WTCSGNL10": "tc10.gif",
            "WRAINA": "wrainr.gif", "WRAINR": "wrainm.gif", "WRAINB": "wrainb.gif", // Amber, Red, Black
            "WTS": "wts.gif", "WL": "wlandslip.gif", "WFN": "wfrost.gif", 
            "WCOLD": "wcold.gif", "VHOT": "vhot.gif", 
            "WFIREY": "wfirey.gif", "WFIRER": "wfirer.gif", 
            "WMS": "wmsms.gif", "WTCON": "wtsunami.gif"
        };

        // Fetch Real-time Weather Warnings from Hong Kong Observatory
        async function fetchHKOWarnings() {
            const container = document.getElementById('warning-container');
            try {
                const response = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=en');
                const data = await response.json();
                
                // Filter active issues
                const activeWarnings = Object.keys(data).filter(key => data[key].actionCode !== "CANCEL");

                if (activeWarnings.length === 0) {
                    container.innerHTML = '<div class="no-warning-msg">All Clear</div>';
                } else {
                    let gridHtml = '<div class="warning-grid">';
                    activeWarnings.forEach(code => {
                        const iconFile = hkoIconMap[code];
                        if (iconFile) {
                            // Pointing to official HKO production image assets
                            const imgUrl = `https://www.hko.gov.hk/img/w_icon/${iconFile}`;
                            gridHtml += `<img src="${imgUrl}" class="warning-icon" alt="${data[code].name}" title="${data[code].name}">`;
                        } else {
                            // Fallback string if code mapping isn't found
                            gridHtml += `<div style="font-size:0.8rem; font-weight:700; border:1px solid #000; padding:4px;">${data[code].name}</div>`;
                        }
                    });
                    gridHtml += '</div>';
                    container.innerHTML = gridHtml;
                }
            } catch (error) {
                container.innerHTML = '<div style="font-size:0.8rem;">Warning Data Unavailable</div>';
            }
        }

        // Fetch Integrated Traffic and MTR Alerts via Data.gov.hk Unified Special Traffic Feed
        async function fetchTransitStatus() {
            const mtrContainer = document.getElementById('mtr-status');
            const trafficContainer = document.getElementById('traffic-status');

            try {
                // Fetching the cross-origin friendly parsed JSON output from the government's official RSS system
                const response = await fetch('https://api.data.gov.hk/v1/filter?url=https%3A%2F%2Ftis.hd.gov.hk%2Fede%2Fsptn_dis_eng.xml');
                const data = await response.json();
                
                let mtrIncidents = [];
                let roadIncidents = [];

                // Standard parser structure for the converted XML array format
                if (data && data.record) {
                    const records = Array.isArray(data.record) ? data.record : [data.record];
                    
                    records.forEach(rec => {
                        const contentText = rec.content || "";
                        
                        // Parse logic assigning notices natively via keyword checking
                        if (contentText.toUpperCase().includes("MTR") || contentText.toUpperCase().includes("TRAIN") || contentText.toUpperCase().includes("RAILWAY")) {
                            mtrIncidents.push(contentText);
                        } else {
                            roadIncidents.push(contentText);
                        }
                    });
                }

                // Render MTR Box Content
                if (mtrIncidents.length === 0) {
                    mtrContainer.innerHTML = '<div class="status-normal">Normal Service</div>';
                } else {
                    let html = '';
                    mtrIncidents.slice(0, 3).forEach(msg => { // Limit to 3 items to fit without scrolling
                        // Clean up strings slightly for tiny screen display readability
                        const snippet = msg.length > 85 ? msg.substring(0, 85) + '...' : msg;
                        html += `<div class="status-line"><div class="status-dot"></div><div>${snippet}</div></div>`;
                    });
                    mtrContainer.innerHTML = html;
                }

                // Render Road Traffic Box Content
                if (roadIncidents.length === 0) {
                    trafficContainer.innerHTML = '<div class="status-normal">Traffic Flow Normal</div>';
                } else {
                    let html = '';
                    roadIncidents.slice(0, 3).forEach(msg => {
                        const snippet = msg.length > 85 ? msg.substring(0, 85) + '...' : msg;
                        html += `<div class="status-line"><div class="status-dot"></div><div>${snippet}</div></div>`;
                    });
                    trafficContainer.innerHTML = html;
                }

            } catch (error) {
                mtrContainer.innerHTML = '<div style="color:#555;">Status Unreachable</div>';
                trafficContainer.innerHTML = '<div style="color:#555;">Status Unreachable</div>';
            }
        }

        // Initialization and Refresh Loops
        function refreshData() {
            fetchSunTimes();
            fetchHKOWarnings();
            fetchTransitStatus();
        }

        // Initial Executions
        refreshData();

        // Refresh live data feeds every 10 minutes to respect server polling limits and prevent excessive e-ink ghosting flashing updates.
        setInterval(refreshData, 600000);
    </script>
</body>
</html>
