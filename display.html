<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Desktop E-Ink Dashboard</title>
    <style>
        /* Premium E-Ink Typography & Contrast Optimization */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Georgia, serif;
            color: #000000;
            background-color: #ffffff;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        /* 1.5 : 1 Fixed Aspect Ratio Frame */
        .dashboard {
            width: 100%;
            height: 100%;
            max-width: 960px;
            max-height: 640px;
            display: grid;
            grid-template-columns: 1.3fr 1fr 1fr;
            grid-template-rows: 100%;
            column-gap: 24px;
        }

        .column {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        /* Divider lines between sections */
        .divider {
            border-left: 1px solid #000000;
            height: 100%;
        }

        /* Typography Hierarchy */
        h2 {
            font-family: -apple-system, sans-serif;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #000000;
        }

        /* Column 1: Time, Sun, Warnings */
        .time-module {
            padding-bottom: 15px;
        }

        #clock {
            font-size: 64px;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
        }

        #date {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 2px;
            text-transform: uppercase;
        }

        .sun-module {
            display: flex;
            gap: 20px;
            font-size: 12px;
            font-weight: 500;
            padding-bottom: 20px;
            border-bottom: 1px dashed #000000;
            margin-bottom: 20px;
        }

        .warning-module {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .warning-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }

        .warning-grid img {
            width: 46px;
            height: 46px;
            object-fit: contain;
            filter: grayscale(100%) contrast(200%);
        }

        .no-warning-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #666666;
            padding: 10px 0;
            font-style: italic;
        }

        /* Columns 2 & 3: Data Feeds */
        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: hidden;
        }

        .feed-item {
            font-size: 12px;
            line-height: 1.4;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .feed-item strong {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            display: block;
            margin-bottom: 2px;
        }

        /* High contrast alert state for critical updates */
        .alert-active {
            background-color: #000000 !important;
            color: #ffffff !important;
            padding: 8px;
            margin-top: 4px;
        }
        
        .alert-active * {
            background-color: #000000 !important;
            color: #ffffff !important;
        }

        .status-clear {
            font-size: 12px;
            color: #444444;
            padding-top: 5px;
        }

        .loading-text {
            font-size: 11px;
            font-style: italic;
            color: #888888;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="column">
            <div class="time-module">
                <div id="clock">00:00</div>
                <div id="date">--- -- ---</div>
            </div>
            <div class="sun-module">
                <div>↑ <span id="sunrise">--:--</span></div>
                <div>↓ <span id="sunset">--:--</span></div>
            </div>
            <div class="warning-module">
                <h2>Alert Signals</h2>
                <div id="warning-target" class="warning-grid">
                    <div class="loading-text">Connecting...</div>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="column">
            <h2>MTR Network</h2>
            <div id="mtr-target" class="feed-container">
                <div class="loading-text">Connecting to MTR...</div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="column">
            <h2>Road Incidents</h2>
            <div id="traffic-target" class="feed-container">
                <div class="loading-text">Connecting to TD...</div>
            </div>
        </div>
    </div>

    <script>
        // MANUALLY EDIT YOUR LINKS HERE. 
        // These keys map directly to the official Hong Kong Observatory API return payload.
        const HKO_ICON_MAP = {
            "WTIGNL1":   "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc1.gif",
            "WTIGNL3":   "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc3.gif",
            "WTIGNL8NE": "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc8ne.gif",
            "WTIGNL8NW": "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc8d.gif",
            "WTIGNL8SE": "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc8se.gif",
            "WTIGNL8SW": "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc8sw.gif",
            "WTIGNL9":   "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc9.gif",
            "WTIGNL10":  "https://www.hko.gov.hk/en/wxinfo/dailywx/images/tc10.gif",
            "WRAINA":    "https://www.hko.gov.hk/en/wxinfo/dailywx/images/raina.gif",
            "WRAINR":    "https://www.hko.gov.hk/en/wxinfo/dailywx/images/rainr.gif",
            "WRAINB":    "https://www.hko.gov.hk/en/wxinfo/dailywx/images/rainb.gif",
            "WTS":       "https://www.hko.gov.hk/images/wxinfo/warning/ts.gif",
            "WTHU":      "https://www.hko.gov.hk/en/wxinfo/dailywx/images/ts.gif",
            "WFIREY":    "https://www.hko.gov.hk/en/wxinfo/dailywx/images/firey.gif",
            "WFIREO":    "https://www.hko.gov.hk/en/wxinfo/dailywx/images/firer.gif",
            "WHOT":      "https://www.hko.gov.hk/en/wxinfo/dailywx/images/vhot.gif",
            "WCOLD":     "https://www.hko.gov.hk/en/wxinfo/dailywx/images/cold.gif",
            "WFROST":    "https://www.hko.gov.hk/en/wxinfo/dailywx/images/frost.gif",
            "WLIP":      "https://www.hko.gov.hk/en/wxinfo/dailywx/images/landslip.gif",
            "WMSGNL":    "https://www.hko.gov.hk/images/wxinfo/warning/sms.gif"
        };

        // Global CORS proxy wrapper to bypass origin restrictions on client local files
        function proxyURL(url) {
            return `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
        }

        // 1. Clock Engine
        function updateClock() {
            const hkTime = new Date(new Date().toLocaleString("en-US", {timeZone: "Asia/Hong_Kong"}));
            const hours = String(hkTime.getHours()).padStart(2, '0');
            const minutes = String(hkTime.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;

            const options = { weekday: 'short', month: 'short', day: 'numeric' };
            document.getElementById('date').textContent = hkTime.toLocaleDateString('en-US', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Sunrise / Sunset Ephemeris
        async function fetchSunData() {
            try {
                const res = await fetch(proxyURL('https://api.sunrise-sunset.org/json?lat=22.3193&lng=114.1694&formatted=0'));
                const data = await res.json();
                if (data.status === 'OK') {
                    const sunriseParsed = new Date(data.results.sunrise).toLocaleTimeString('en-US', {timeZone: 'Asia/Hong_Kong', hour12: false, hour: '2-digit', minute:'2-digit'});
                    const sunsetParsed = new Date(data.results.sunset).toLocaleTimeString('en-US', {timeZone: 'Asia/Hong_Kong', hour12: false, hour: '2-digit', minute:'2-digit'});
                    document.getElementById('sunrise').textContent = sunriseParsed;
                    document.getElementById('sunset').textContent = sunsetParsed;
                }
            } catch (e) {
                document.getElementById('sunrise').textContent = "--:--";
            }
        }

        // 3. HKO Warnings Integration
        async function fetchHKOWarnings() {
            const target = document.getElementById('warning-target');
            try {
                const res = await fetch(proxyURL('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=en'));
                const data = await res.json();
                target.innerHTML = '';
                
                const activeCodes = Object.keys(data);
                if (activeCodes.length === 0) {
                    target.innerHTML = '<div class="no-warning-label">No Active Warnings</div>';
                    return;
                }

                activeCodes.forEach(code => {
                    const item = data[code];
                    const img = document.createElement('img');
                    // Look up mapping logic or fallback to explicit key
                    const manualSrc = HKO_ICON_MAP[item.code];
                    
                    img.src = manualSrc ? manualSrc : `https://www.hko.gov.hk/images/wxinfo/warning/${item.code.toLowerCase()}.gif`;
                    img.alt = item.name;
                    img.title = item.name;
                    target.appendChild(img);
                });
            } catch (e) {
                target.innerHTML = '<div class="loading-text">Data error</div>';
            }
        }

        // 4. MTR System Diagnostics
        async function fetchMTRStatus() {
            const target = document.getElementById('mtr-target');
            try {
                const res = await fetch(proxyURL('https://rt.data.gov.hk/v1/transport/mtr/serviceStatus.php'));
                const data = await res.json();
                target.innerHTML = '';

                if (data.status === 1 && (!data.lines || Object.keys(data.lines).length === 0)) {
                    target.innerHTML = '<div class="status-clear">Normal operation across all lines.</div>';
                    return;
                }

                let delays = 0;
                for (const [line, info] of Object.entries(data.lines || {})) {
                    if (info.status && info.status !== 'NORMAL') {
                        delays++;
                        const el = document.createElement('div');
                        el.className = 'feed-item alert-active';
                        el.innerHTML = `<strong>${line} Line</strong>${info.text_en}`;
                        target.appendChild(el);
                    }
                }

                if (delays === 0) {
                    target.innerHTML = '<div class="status-clear">Normal operation across all lines.</div>';
                }
            } catch (e) {
                target.innerHTML = '<div class="loading-text">Unable to reach MTR API</div>';
            }
        }

        // 5. Road Network Incidents
        async function fetchTrafficIncidents() {
            const target = document.getElementById('traffic-target');
            try {
                const res = await fetch(proxyURL('https://resource.data.gov.hk/te/traffic-incident.json'));
                const data = await res.json();
                target.innerHTML = '';

                const incidents = data.incidents || [];
                if (incidents.length === 0) {
                    target.innerHTML = '<div class="status-clear">No major road closures reported.</div>';
                    return;
                }

                // Render cap to cleanly avoid window overflow
                const renderLimit = Math.min(incidents.length, 4);
                for (let i = 0; i < renderLimit; i++) {
                    const item = incidents[i];
                    const el = document.createElement('div');
                    el.className = 'feed-item';
                    
                    let content = item.trafficNotices[0].noticeContentEN;
                    if (content.length > 110) content = content.substring(0, 107) + '...';

                    el.innerHTML = `<strong>${item.region || 'Alert'}</strong>${content}`;
                    target.appendChild(el);
                }
            } catch (e) {
                target.innerHTML = '<div class="loading-text">Unable to reach Traffic API</div>';
            }
        }

        // Orchestration Loop
        function mainLoop() {
            fetchSunData();
            fetchHKOWarnings();
            fetchMTRStatus();
            fetchTrafficIncidents();
        }

        mainLoop();
        // Sync interval configured to 5 minutes
        setInterval(mainLoop, 300000);
    </script>
</body>
</html>
